name: Apply dashboard KPI update

on:
  push:
    paths:
      - scripts/apply-dashboard-kpi-update.mjs

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply dashboard changes
        run: node scripts/apply-dashboard-kpi-update.mjs
      - name: Commit generated update
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/views/Dashboard.tsx
          git commit -m "Improve dashboard KPI trends"
          git push
